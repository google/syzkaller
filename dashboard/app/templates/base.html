    {{/*
    This is the main layout for the application. All pages should inherit from this.
    */}}
    <!doctype html>
    <html>
    <head>
        {{template "head.html" .Header}}
    </head>
    <body>
        {{template "header.html" .Header}}
        <main>
            {{block "content" .}}
            <!-- Page-specific content will be injected here -->
            {{end}}
        </main>
    </body>
    </html>
