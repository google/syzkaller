name: CSB actions
on: [workflow_dispatch, push, pull_request]

jobs:
   Compile:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tool: [syz-trace2syz, syz-prog2c, syz-extraction]
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Compile ${{ matrix.tool }}
        run: |
          go env -w GOBIN=$HOME/.local/bin
          make
          cd tools/${{ matrix.tool }}
          go build

   Test:
     runs-on: ubuntu-latest
     steps:
       - uses: actions/checkout@v4

       - uses: actions/setup-go@v5
         with:
           go-version: '1.25'

       - name: run bm-generator from CSB
         env:
           BRANCH_NAME: ${{ github.ref_name }}
         run: |
           git clone https://github.com/open-s4c/csb.git
           cd csb
           git submodule update --init

           cd deps/syzkaller/
           git fetch
           echo "checking out $BRANCH_NAME"
           git checkout "$BRANCH_NAME"
           git log

           cd ../../
           go env -w GOBIN=$HOME/.local/bin

           cd bm-generator
           ./test.sh
       - name: Upload strace log
         uses: actions/upload-artifact@v4
         if: always()
         with:
           name: ls_strace
           path: csb/bm-generator/ls_strace.log
