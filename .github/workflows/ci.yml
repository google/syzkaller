# GitHub workflow reference:
# https://help.github.com/en/actions/reference/workflow-syntax-for-github-actions

name: ci
on: [push, pull_request]
permissions:
  contents: read

# https://stackoverflow.com/questions/66335225/how-to-cancel-previous-runs-in-the-pr-when-you-push-new-commitsupdate-the-curre
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  aux:
    runs-on: ubuntu-latest
    container: gcr.io/syzkaller/env:latest
    env:
      GOPATH: /__w/syzkaller/syzkaller/gopath
      CI: true
      TERM: dumb
    steps:
      # Checks out syzkaller repo at the path.
      - name: checkout
        uses: actions/checkout@c85c95e3d7251135ab7dc9ce3241c5835cc595a9 # v3.5.3
        with:
          path: gopath/src/github.com/google/syzkaller
          # This is needed for tools/check-commits.sh
          fetch-depth: 100
      - id: get-date
        run: echo "date=$(/bin/date -u "+%Y%m%d")" >> $GITHUB_OUTPUT
        shell: bash
      - name: update cache
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: /syzkaller/.cache
          key: ${{ runner.os }}-syzenv-${{ steps.get-date.outputs.date }}
      # Run make presubmit_aux.
      - name: run
        env:
          GITHUB_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_PR_COMMITS: ${{ github.event.pull_request.commits }}
        run: |
          cd gopath/src/github.com/google/syzkaller
          .github/workflows/run.sh make presubmit_aux

  lint:
    runs-on: ubuntu-latest
    container: gcr.io/syzkaller/env:latest
    env:
      GOPATH: /__w/syzkaller/syzkaller/gopath
      CI: true
      TERM: dumb
    steps:
      - name: checkout
        uses: actions/checkout@c85c95e3d7251135ab7dc9ce3241c5835cc595a9 # v3.5.3
        with:
          path: gopath/src/github.com/google/syzkaller
      - name: restore cache
        uses: actions/cache/restore@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: /syzkaller/.cache
          key: ${{ runner.os }}-syzenv-
      - name: run
        run: |
          cd gopath/src/github.com/google/syzkaller
          # Run build and lint without tests
          .github/workflows/run.sh make presubmit_lint

  test_sharded:
    runs-on: ubuntu-latest
    container: gcr.io/syzkaller/env:latest
    env:
      GOPATH: /__w/syzkaller/syzkaller/gopath
      CI: true
      TERM: dumb
      GITHUB_ACTIONS: true
    strategy:
      matrix:
        test_shard: ['1/5', '2/5', '3/5', '4/5', '5/5']
    steps:
      - name: checkout
        uses: actions/checkout@c85c95e3d7251135ab7dc9ce3241c5835cc595a9 # v3.5.3
        with:
          path: gopath/src/github.com/google/syzkaller
      - name: restore cache
        uses: actions/cache/restore@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: /syzkaller/.cache
          key: ${{ runner.os }}-syzenv-
      - name: run
        run: |
          cd gopath/src/github.com/google/syzkaller
          TEST_SHARD=${{ matrix.test_shard }} \
            .github/workflows/run.sh make presubmit_test
      - name: codecov
        uses: codecov/codecov-action@5ecb98a3c6b747ed38dc09f787459979aebb39be # v4.3.1
        with:
          codecov_yml_path: ${{env.GOPATH}}/src/github.com/google/syzkaller/.github/codecov.yml
          file: ${{env.GOPATH}}/src/github.com/google/syzkaller/.coverage.txt
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  dashboard_sharded:
    runs-on: ubuntu-latest
    container: gcr.io/syzkaller/env:latest
    env:
      GOPATH: /__w/syzkaller/syzkaller/gopath
      CI: true
      TERM: dumb
      GITHUB_ACTIONS: true
    strategy:
      matrix:
        test_shard: ['1/5', '2/5', '3/5', '4/5', '5/5']
    steps:
      - name: checkout
        uses: actions/checkout@c85c95e3d7251135ab7dc9ce3241c5835cc595a9 # v3.5.3
        with:
          path: gopath/src/github.com/google/syzkaller
      - name: restore cache
        uses: actions/cache/restore@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: /syzkaller/.cache
          key: ${{ runner.os }}-syzenv-
      - name: run
        run: |
          cd gopath/src/github.com/google/syzkaller
          TEST_SHARD=${{ matrix.test_shard }} \
            .github/workflows/run.sh timeout --signal=SIGINT 15m make presubmit_dashboard
      - name: codecov
        uses: codecov/codecov-action@5ecb98a3c6b747ed38dc09f787459979aebb39be # v4.3.1
        with:
          codecov_yml_path: ${{env.GOPATH}}/src/github.com/google/syzkaller/.github/codecov.yml
          file: ${{env.GOPATH}}/src/github.com/google/syzkaller/.coverage.txt
          flags: dashboard
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  arch:
    runs-on: ubuntu-latest
    container: gcr.io/syzkaller/env:latest
    env:
      GOPATH: /__w/syzkaller/syzkaller/gopath
      CI: true
      TERM: dumb
    strategy:
      matrix:
        target: [ presubmit_arch_linux, presubmit_arch_freebsd, presubmit_arch_netbsd, presubmit_arch_openbsd, presubmit_arch_darwin, presubmit_arch_windows, presubmit_arch_executor ]
    steps:
      - name: checkout
        uses: actions/checkout@c85c95e3d7251135ab7dc9ce3241c5835cc595a9 # v3.5.3
        with:
          path: gopath/src/github.com/google/syzkaller
      - name: restore cache
        uses: actions/cache/restore@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: /syzkaller/.cache
          key: ${{ runner.os }}-syzenv-
      - name: run
        run: |
          cd gopath/src/github.com/google/syzkaller
          .github/workflows/run.sh make ${{ matrix.target }}

  race_sharded:
    runs-on: ubuntu-latest
    container: gcr.io/syzkaller/env:latest
    timeout-minutes: 15
    env:
      GOPATH: /__w/syzkaller/syzkaller/gopath
      CI: true
      TERM: dumb
    strategy:
      matrix:
        test_shard: ['1/10', '2/10', '3/10', '4/10', '5/10', '6/10', '7/10', '8/10', '9/10', '10/10']
    steps:
      - name: checkout
        uses: actions/checkout@c85c95e3d7251135ab7dc9ce3241c5835cc595a9 # v3.5.3
        with:
          path: gopath/src/github.com/google/syzkaller
      - name: restore cache
        uses: actions/cache/restore@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: /syzkaller/.cache
          key: ${{ runner.os }}-syzenv-
      - name: run
        run: |
          cd gopath/src/github.com/google/syzkaller
          TEST_SHARD=${{ matrix.test_shard }} \
            .github/workflows/run.sh make presubmit_race

  race_dashboard_sharded:
    runs-on: ubuntu-latest
    container: gcr.io/syzkaller/env:latest
    env:
      GOPATH: /__w/syzkaller/syzkaller/gopath
      CI: true
      TERM: dumb
    strategy:
      matrix:
        test_shard: ['1/5', '2/5', '3/5', '4/5', '5/5']
    steps:
      - name: checkout
        uses: actions/checkout@c85c95e3d7251135ab7dc9ce3241c5835cc595a9 # v3.5.3
        with:
          path: gopath/src/github.com/google/syzkaller
      - name: restore cache
        uses: actions/cache/restore@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: /syzkaller/.cache
          key: ${{ runner.os }}-syzenv-
      - name: run
        run: |
          cd gopath/src/github.com/google/syzkaller
          TEST_SHARD=${{ matrix.test_shard }} \
            .github/workflows/run.sh make presubmit_race_dashboard

  old:
    runs-on: ubuntu-latest
    container: gcr.io/syzkaller/old-env:latest
    env:
      GOPATH: /__w/syzkaller/syzkaller/gopath
      GOMODCACHE: /syzkaller/.cache/gomod
      CI: true
      TERM: dumb
    steps:
      - name: checkout
        uses: actions/checkout@c85c95e3d7251135ab7dc9ce3241c5835cc595a9 # v3.5.3
        with:
          path: gopath/src/github.com/google/syzkaller
      - name: restore cache
        uses: actions/cache/restore@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: /syzkaller/.cache
          key: ${{ runner.os }}-syzenv-
      - name: run
        run: |
          cd gopath/src/github.com/google/syzkaller
          .github/workflows/run.sh make presubmit_old
  gvisor:
    runs-on: ubuntu-latest
    container:
      image: gcr.io/syzkaller/syzbot:latest
      options: --privileged
    env:
      GOPATH: /__w/syzkaller/syzkaller/gopath
      GOMODCACHE: /syzkaller/.cache/gomod
      CI: true
      TERM: dumb
      GITHUB_ACTIONS: true
    steps:
      - name: checkout
        uses: actions/checkout@c85c95e3d7251135ab7dc9ce3241c5835cc595a9 # v3.5.3
        with:
          path: gopath/src/github.com/google/syzkaller
      - name: restore cache
        uses: actions/cache/restore@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: /syzkaller/.cache
          key: ${{ runner.os }}-syzenv-
      - name: run
        run: |
          cd gopath/src/github.com/google/syzkaller
          make
          .github/workflows/run.sh bash -xe tools/gvisor-smoke-test.sh

  build:
    needs: [test_sharded, lint]
    runs-on: ubuntu-latest
    steps:
      - run: true

  dashboard:
    needs: dashboard_sharded
    runs-on: ubuntu-latest
    steps:
      - run: true

  race:
    needs: race_sharded
    runs-on: ubuntu-latest
    steps:
      - run: true

  race_dashboard:
    needs: race_dashboard_sharded
    runs-on: ubuntu-latest
    steps:
      - run: true
