# https://github.com/actions/stale for details.

name: 'Label stale PRs'
on:
  schedule:
    - cron: '30 1 * * *' # Runs daily at 1:30 AM
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899 # v10.3.0
        with:
          # Disable processing issues entirely
          days-before-issue-stale: -1
          days-before-issue-close: -1

          # Configure stale PR labeling
          days-before-pr-stale: 90
          # Disable automatic closing of PRs
          days-before-pr-close: -1
          stale-pr-message: 'This PR is stale because it has been open 90 days with no activity.'
          stale-pr-label: 'stale'
