{
	"name": "patched",
	"target": "linux/amd64",
	"http": "",
	"rpc": ":0",
	"workdir": "",
	"kernel_obj": "/patched/obj",
	"android_split_build": false,
	"image": "/patched/image",
	"ssh_user": "root",
	"syzkaller": "",
	"procs": 3,
	"max_crash_logs": 100,
	"sandbox": "none",
	"sandbox_arg": 0,
	"snapshot": false,
	"cover": true,
	"raw_cover": false,
	"reproduce": true,
	"fuzzing_vms": 3,
	"preserve_corpus": true,
	"disable_syscalls": [
		"syz_mount_image$hfs",
		"syz_mount_image$gfs*",
		"perf_event_open*",
		"ioctl$PERF*",
		"bpf$BPF_RAW_TRACEPOINT_OPEN"
	],
	"strace_bin": "",
	"strace_bin_on_target": false,
	"execprog_bin_on_target": "",
	"executor_bin_on_target": "",
	"run_fsck": true,
	"type": "gce",
	"vm": {
		"auto_delete_image": true,
		"count": 9,
		"gcs_path": "syzkaller/disks",
		"kernel": "/patched/kernel",
		"machine_type": "e2-standard-2"
	},
	"asset_storage": null,
	"memory_dump": false,
	"Experimental": {
		"reset_acc_state": false,
		"remote_cover": true,
		"cover_edges": false,
		"descriptions_mode": "manual",
		"enable_kfuzztest": false
	}
}