{
	"name": "base",
	"target": "linux/amd64",
	"http": "",
	"rpc": ":0",
	"workdir": "",
	"kernel_obj": "",
	"android_split_build": false,
	"image": "/base/image",
	"ssh_user": "root",
	"syzkaller": "",
	"procs": 3,
	"max_crash_logs": 100,
	"sandbox": "none",
	"sandbox_arg": 0,
	"snapshot": false,
	"cover": true,
	"raw_cover": false,
	"reproduce": true,
	"preserve_corpus": true,
	"enable_syscalls": [
		"openat$kvm",
		"openat$sev",
		"close",
		"ioctl$KVM*",
		"syz_kvm*",
		"mmap$KVM_VCPU",
		"munmap",
		"syz_memcpy_off$KVM_EXIT_MMIO",
		"syz_memcpy_off$KVM_EXIT_HYPERCALL",
		"eventfd2",
		"write$eventfd"
	],
	"strace_bin": "",
	"strace_bin_on_target": false,
	"execprog_bin_on_target": "",
	"executor_bin_on_target": "",
	"run_fsck": true,
	"type": "gce",
	"vm": {
		"auto_delete_image": true,
		"count": 3,
		"gcs_path": "syzkaller/disks",
		"machine_type": "n2-standard-2"
	},
	"asset_storage": null,
	"memory_dump": false,
	"Experimental": {
		"reset_acc_state": false,
		"remote_cover": true,
		"cover_edges": false,
		"descriptions_mode": "manual",
		"enable_kfuzztest": false
	}
}